---
- name: Provision Cloud Resources
  hosts: all
  gather_facts: true
  become: yes

  vars_files:
    - "{{ playbook_dir }}/.env.yml"

  vars:
    prometheus_retention_time: 30d
    prometheus_retention_size: 15GB

  tasks:
    - name: Update System
      ansible.builtin.apt:
        update_cache: yes

    - name: Upgrade System
      ansible.builtin.apt:
        upgrade: "yes"

    - name: Install Tailscale
      ansible.builtin.shell: |
        curl -fsSL https://tailscale.com/install.sh | sh

    - name: Ensure tailscaled is running
      ansible.builtin.service:
        name: tailscaled
        state: started
        enabled: true
      become: true

    - name: Check Tailscale JSON status
      ansible.builtin.command: tailscale status --json
      register: ts_json
      changed_when: false
      become: true

    - name: Parse BackendState
      ansible.builtin.set_fact:
        ts_backend_state: "{{ (ts_json.stdout | from_json).BackendState | default('') }}"

    - name: Look up Auth Key
      ansible.builtin.set_fact:
        tailscale_auth_key: "{{ TAILSCALE_AUTH_KEY }}"

    - name: Tailscale up if not connected
      ansible.builtin.command: >
        tailscale up
        --authkey={{ tailscale_auth_key }}
        --advertise-exit-node
        --accept-dns=true
      become: true
      when: ts_backend_state in ['NeedsLogin', 'Stopped', 'NoState']

    - name: Template Prometheus config
      ansible.builtin.template:
        src: "{{ playbook_dir | dirname }}/monitoring/prometheus.yml.j2"
        dest: /tmp/prometheus.yml
        mode: "0644"
      delegate_to: localhost
      run_once: true
      become: false

    - name: Install and Configure Prometheus
      ansible.builtin.include_role:
        name: prometheus.prometheus.prometheus
      vars:
        prometheus_config_file: /tmp/prometheus.yml
        prometheus_storage_retention: "{{ prometheus_retention_time }}"
        prometheus_storage_retention_size: "{{ prometheus_retention_size }}"

    - name: Validate Prometheus configuration
      ansible.builtin.command:
        cmd: promtool check config /etc/prometheus/prometheus.yml
      changed_when: false

    - name: Remove temp Prometheus config
      ansible.builtin.file:
        path: /tmp/prometheus.yml
        state: absent
      delegate_to: localhost
      run_once: true
      become: false
      changed_when: false

    - name: Install and Configure Node-Exporter
      ansible.builtin.include_role:
        name: prometheus.prometheus.node_exporter

    - name: Install and Configure Alertmanager
      ansible.builtin.include_role:
        name: prometheus.prometheus.alertmanager
      vars:
        alertmanager_config_file: "{{ playbook_dir | dirname }}/monitoring/alertmanager.yml"

    - name: Validate Alertmanager configuration
      ansible.builtin.command:
        cmd: amtool check-config /etc/alertmanager/alertmanager.yml
      changed_when: false

    - name: Add Grafana GPG key
      ansible.builtin.get_url:
        url: https://apt.grafana.com/gpg.key
        dest: /etc/apt/keyrings/grafana.asc
        mode: "0644"

    - name: Add Grafana APT repository
      ansible.builtin.deb822_repository:
        name: grafana
        types: deb
        uris: https://apt.grafana.com
        suites: stable
        components: main
        signed_by: /etc/apt/keyrings/grafana.asc
        state: present

    - name: Install Grafana
      ansible.builtin.apt:
        name: grafana
        state: present
        update_cache: true

    - name: Create Grafana provisioning directory
      ansible.builtin.file:
        path: /etc/grafana/provisioning/datasources
        state: directory
        owner: grafana
        group: grafana
        mode: "0755"

    - name: Configure Grafana Prometheus datasource
      ansible.builtin.copy:
        src: "{{ playbook_dir | dirname }}/monitoring/grafana-datasources.yml"
        dest: /etc/grafana/provisioning/datasources/prometheus.yml
        owner: grafana
        group: grafana
        mode: "0644"
      notify: restart grafana-server

    - name: Enable and start Grafana
      ansible.builtin.service:
        name: grafana-server
        enabled: true
        state: started

  handlers:
    - name: restart grafana-server
      ansible.builtin.service:
        name: grafana-server
        state: restarted

global:
  scrape_interval: 30s
  external_labels:
    monitor: "codelab-monitor"

scrape_configs:
  - job_name: "prometheus"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-host"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: "node-home"
    scrape_interval: 30s
    static_configs:
      - targets: ["fedora:9100"]

  - job_name: "node-exporter"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "k8-cp1:9100"
        labels:
          role: control-plane
      - targets:
          - "k8-worker1:9100"
          - "k8-worker2:9100"
        labels:
          role: worker

  - job_name: "kube-state-metrics"
    scrape_interval: 30s
    scheme: https
    static_configs:
      - targets:
          - "kube-state-metrics.tailnet-name.example.ts.net"

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homeserver-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/goodguyryan/homeserver.git
    targetRevision: main
    path: argocd/applications

    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      selfHeal: true
      prune: false

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homeserver-k8s
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/goodguyryan/homeserver.git
    targetRevision: main
    path: k8s

    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    syncOptions:
      # Prevent deletion during the initial migration.
      - Prune=false

      # Prevent two Argo CD Applications from owning the same resource.
      - FailOnSharedResource=true

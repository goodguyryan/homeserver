apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-system
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/goodguyryan/homeserver.git
    targetRevision: main
    path: argocd/system

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - Prune=false

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homeserver-namespaces
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/goodguyryan/homeserver.git
    targetRevision: main
    path: k8s/namespaces

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      selfHeal: true
      prune: false
    syncOptions:
      - Prune=false

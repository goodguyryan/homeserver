apiVersion: v1
kind: Namespace
metadata:
  name: hermes

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-data
  namespace: hermes
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hermes
  namespace: hermes
spec:
  serviceName: hermes
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: Always

          # Keep the pod alive so you can exec into it.
          command: ["sleep"]
          args: ["infinity"]

          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data

      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-data
